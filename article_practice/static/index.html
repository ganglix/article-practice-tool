<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>article practice</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Article Practice</p>
        <h1>article practice</h1>
        <p class="hero-copy">
          Paste a passage, answer the missing articles inline, and grade it
          immediately.
        </p>
      </header>

      <main class="layout">
        <section class="panel source-panel reveal">
          <div class="panel-header">
            <h2>Source Passage</h2>
            <button id="sample-button" class="ghost-button" type="button">
              Load Sample
            </button>
          </div>
          <form id="source-form">
            <label class="field-label" for="source-text">
              Paste well-written English text
            </label>
            <textarea
              id="source-text"
              name="source-text"
              placeholder="Paste a paragraph or two here."
              rows="12"
            ></textarea>
            <div class="action-row">
              <button id="generate-button" class="primary-button" type="submit">
                Generate Exercise
              </button>
              <button id="reset-button" class="ghost-button" type="button">
                Reset
              </button>
            </div>
          </form>
          <p id="source-error" class="error-text" aria-live="polite"></p>
        </section>

        <section id="practice-panel" class="panel practice-panel reveal hidden">
          <div class="panel-header">
            <div>
              <h2>Practice</h2>
              <p id="practice-meta" class="panel-copy"></p>
            </div>
            <button id="grade-button" class="primary-button" type="button">
              Grade Answers
            </button>
          </div>
          <div id="exercise-surface" class="exercise-surface" aria-live="polite"></div>
        </section>

        <section id="results-panel" class="panel results-panel reveal hidden">
          <div class="panel-header">
            <div>
              <h2>Results</h2>
              <p id="results-summary" class="panel-copy"></p>
            </div>
          </div>
          <div id="score-card" class="score-card"></div>
          <div id="mistake-list" class="mistake-list"></div>
          <div class="original-panel">
            <h3>Original Passage</h3>
            <pre id="original-text" class="original-text"></pre>
          </div>
        </section>
      </main>
    </div>

    <template id="blank-template">
      <label class="blank-shell">
        <input
          class="blank-input"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          maxlength="3"
        />
        <span class="blank-answer"></span>
      </label>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
